
name: Release

permissions:
  contents: read

on:
  push:
#    tags:
#      - v[0-9]+.*

jobs:

  upload-companion:
    runs-on: ubuntu-latest
    working-directory: ./companion-module-scoreboard-scoreboard
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with: 
          node-version: '24'
          cache: 'yarn'
      - name: Install Dependencies
        run: yarn install 
      - name: Build Companion Module
        run: yarn companion-module-build

