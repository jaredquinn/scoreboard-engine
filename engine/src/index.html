<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard Control | Professional Engine</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --primary: #3b82f6;
            --danger: #ef4444;
            --accent: #60a5fa;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header & Navigation --- */
        header {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 2.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand h1 { margin: 0; font-size: 1.1rem; letter-spacing: 2px; font-weight: 700; color: var(--text); }
        
        #status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--danger);
            transition: all 0.3s;
        }
        #status-indicator.online { background: var(--success); box-shadow: 0 0 10px var(--success); }

        /* --- Grid Layout --- */
        #widgets-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2rem;
            padding: 2.5rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* --- Widget Cards --- */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .widget-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .value { font-size: 4rem; font-weight: 800; margin: 0.5rem 0; color: var(--text); }
        .timer-display { font-family: 'JetBrains Mono', 'Courier New', monospace; color: var(--accent); }

        .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; margin-top: 1.2rem; }

        button {
            background: #334155;
            color: white;
            border: 1px solid transparent;
            padding: 0.5rem 1.0rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover { background: #475569; border-color: var(--accent); }
        button:active { transform: scale(0.96); }

	/* --- Bounds Grid (3-Column Settings) --- */
	.bounds-grid {
	    display: grid;
	    grid-template-columns: 1fr 1fr 1fr;
	    gap: 8px;
	}

	.bound-item {
	    background: var(--card);
	    padding: 6px;
	    display: flex;
	    flex-direction: column;
	    align-items: center;
	}

	.bound-item span {
	    font-size: 0.55rem;
	    color: #94a3b8;
	    margin-bottom: 2px;
	}

	.bound-item strong {
	    font-size: 0.8rem;
	    color: var(--accent);
	}

	.btn-small {
	    padding: 0.3rem 0.6rem;
	    font-size: 0.65rem;
	    background: #334155;
	    border: 1px solid transparent;
	    color: #cbd5e1;
	    border-radius: 4px;
	    width: 100%;
	}

	.btn-small:hover {
	    background: #475569;
	    color: white;
	    border-color: var(--accent);
	}

	.btn-reset-card {
	    background: transparent;
	    color: var(--danger);
	    border: 1px solid rgba(239, 68, 68, 0.2);
	    font-size: 0.7rem;
	    padding: 5px;
	    margin-top: 5px;
	}

	.btn-reset-card:hover {
	    background: rgba(239, 68, 68, 0.1);
	    border-color: var(--danger);
	}

	.admin-section {
		margin-top: 1rem;
	}

        /* --- Debug Console --- */
        #debug-toggle { position: fixed; bottom: 10px; right: 10px; font-size: 10px; opacity: 0.5; cursor: pointer; }
        #debug-log { 
            display: none; position: fixed; bottom: 40px; right: 10px; 
            background: black; color: #00ff00; padding: 10px; 
            font-family: monospace; font-size: 11px; max-width: 400px; 
            max-height: 300px; overflow: auto; border-radius: 8px; z-index: 1000;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div id="status-indicator"></div>
            <h1>SCOREBOARD ENGINE</h1>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-danger" onclick="triggerSystemReset()">SYSTEM RESET</button>
        </div>
    </header>

    <div id="widgets-container">
    </div>

    <div id="debug-toggle" onclick="document.getElementById('debug-log').style.display = 'block'">SHOW DEBUG</div>
    <div id="debug-log"></div>

    <script>
	async function loadInitialState() {
	    console.log("Fetching initial widget state...");
	    try {
		const response = await fetch('/widgets');
		
		if (!response.ok) {
		    throw new Error(`Server responded with status: ${response.status}`);
		}

		const widgets = await response.json();
		
		Object.entries(widgets).forEach(([id, widget]) => {
		    render(id, widget);
		});

		console.log("Initial state synchronization complete.");
	    } catch (err) {
		console.error("Failed to sync with scoreboard engine:", err);
		const container = document.getElementById('widgets-container');
		if (container && container.innerHTML === "") {
		    container.innerHTML = `<div class="error-msg">Connection Error: Is the Rust server running?</div>`;
		}
	    }
	}

	// --- API COMMUNICATIONS ---
        async function api(url, method = 'POST', body = null) {
            try {
                const options = { method };
                if (body) {
                    options.headers = { 'Content-Type': 'application/json' };
                    options.body = JSON.stringify(body);
                }
                const res = await fetch(url, options);
                return res.ok;
            } catch (e) { console.error("API Error:", e); return false; }
        }

        const updateWidget = (id, payload) => api(`/widgets/${id}/update`, 'POST', payload);
        const triggerSystemReset = () => {
            if (confirm("Reload config.xml and clear current scores?")) {
                api('/reset', 'POST');
                document.getElementById('widgets-container').innerHTML = '';
            }
        };

        // --- CORE RENDERER ---
        function render(id, widget) {
            const container = document.getElementById('widgets-container');
            if (!container) return;

            let card = document.getElementById(`card-${id}`);
            if (!card) {
                card = document.createElement('div');
                card.id = `card-${id}`;
                card.className = 'card';
                container.appendChild(card);
            }

            const { type, data } = widget;
            let innerContent = `<div class="widget-label">${id.replace(/_/g, ' ')}</div>`;

            if (type === "Counter") {
                const val = data.value ?? 0;
                const incs = data.increments || [1];
                let buttons = incs.map(inc => `
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <button onclick="updateWidget('${id}', {action:'increment', amount:${inc}})">+${inc}</button>
                        <button class="btn-small" style="opacity:0.5" onclick="updateWidget('${id}', {action:'decrement', amount:${inc}})">-${inc}</button>
                    </div>
                `).join('');
                innerContent += `<div class="value">${val}</div><div class="controls">${buttons}</div>`;
                innerContent += `<button class="btn-reset-card" onclick="updateWidget('${id}', {action:'reset'})">RESET TO 0</button>`;
            } 
	    else if (type === "Timer") {
		    const { initial_seconds, value, formatted_time, running, is_down, seconds, min_value, max_value } = data;
		    
		    innerContent += `
			<div class="value timer-display">${formatted_time}</div>
			
			<div style="font-size: 0.7rem; color: ${is_down ? '#f87171' : '#60a5fa'}; margin-bottom: 10px;">
			    ${is_down ? 'COUNT DOWN' : 'COUNT UP'}
			</div>

			<div class="controls">
			    <button class="${running ? 'btn-stop' : 'btn-main'}" 
				    onclick="updateWidget('${id}', {action:'${running ? 'stop' : 'start'}'})">
				${running ? 'STOP' : 'START'}
			    </button>
			    <button title="Reset to ${initial_seconds}s" onclick="if(confirm('Reset?')) updateWidget('${id}', {action:'reset'})">⟲</button>

			    <button onclick="updateWidget('${id}', {action:'increment', amount: 60})">+1m</button>
			    <button onclick="updateWidget('${id}', {action:'decrement', amount: 60})">-1m</button>
			</div>

			<div class="admin-section">
			    <div class="bounds-grid">
				<div class="bound-item">
				    <span>MIN</span>
				    <strong>${min_value}s</strong>
				    <button style="display: inline-block;" class="btn-reset-card" onclick="let v=prompt('Min Seconds:', ${min_value}); if(v) updateWidget('${id}', {action:'set_min', value:parseInt(v)})">EDIT</button>
				</div>
				<div class="bound-item">
				    <span>INITIAL</span>
				    <strong>${initial_seconds}s</strong>
				    <button style="display: inline-block;" class="btn-reset-card" onclick="let v=prompt('Initial Seconds:', ${initial_seconds}); console.log(v); if(v) updateWidget('${id}', {action:'set_initial', value:parseInt(v)})">EDIT</button>
				</div>
				<div class="bound-item">
				    <span>MAX</span>
				    <strong>${max_value}s</strong>
				    <button style="display: inline-block;" class="btn-reset-card" onclick="let v=prompt('Max Seconds:', ${max_value}); if(v) updateWidget('${id}', {action:'set_max', value:parseInt(v)})">EDIT</button>
				</div>
			    </div>
			</div>
		    `;
		}
		else if (type === "MappedList") {
		    const index = (data && data[0] !== undefined) ? data[0] : 0;
		    const options = (data && data[1]) ? data[1] : [];
		    const displayValue = options[index] || "---";

		    innerContent += `
			<div class="value list-value" style="font-size: 1.8rem; min-height: 1.2em; color: var(--accent);">
			    ${displayValue}
			</div>
			
			<div class="controls">
			    <button title="Previous Item" onclick="updateWidget('${id}', {action:'prev'})">PREV</button>
			    <button title="Next Item" onclick="updateWidget('${id}', {action:'next'})">NEXT</button>
			</div>

			<div class="admin-section" style="margin-top: 1rem;">
			    <button class="btn-reset-card" 
				    style="width: auto; padding: 0.4rem 1rem;" 
				    onclick="updateWidget('${id}', {action:'reset'})">
				RESET TO START
			    </button>
			    <div style="margin-top: 8px; font-size: 0.65rem; color: #64748b;">
				Index: ${index} | Total: ${options.length}
			    </div>
			</div>
		    `;
		}

            // Handling StaticText
            else if (type === "StaticText") {
                innerContent += `
                    <div class="value" style="font-size: 1.5rem; text-align:center;">${data}</div>
                    <button class="btn-reset-card" onclick="let t=prompt('Update Text:', '${data}'); if(t) updateWidget('${id}', t)">EDIT</button>`;
            }

            card.innerHTML = innerContent;
        }

        // --- SSE LIFECYCLE ---
        window.addEventListener('DOMContentLoaded', () => {
		console.log('DOM Content Loaded');
	    loadInitialState();
            const statusIndicator = document.getElementById('status-indicator');
            const debugLog = document.getElementById('debug-log');
            
            const connect = () => {
                const es = new EventSource('/events');

                es.onopen = () => {
                    console.log("Connected to Scoreboard Engine");
                    statusIndicator.classList.add('online');
                };

                es.onmessage = (e) => {
                    const widgets = JSON.parse(e.data);
                    // Update debug log
                    debugLog.innerText = JSON.stringify(widgets, null, 2);
                    
                    // Render each widget found in the payload
                    Object.entries(widgets).forEach(([id, w]) => render(id, w));
                };

                es.onerror = () => {
                    console.error("Connection lost. Retrying...");
                    statusIndicator.classList.remove('online');
                    es.close();
                    setTimeout(connect, 2000); // Auto-reconnect after 2s
                };
            };

            connect();
        });
    </script>
</body>
</html>
