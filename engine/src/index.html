<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard Control | Professional Engine</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --primary: #3b82f6;
            --danger: #ef4444;
            --accent: #60a5fa;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header & Navigation --- */
        header {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 2.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand h1 { margin: 0; font-size: 1.1rem; letter-spacing: 2px; font-weight: 700; color: var(--text); }

        #status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--danger);
            transition: all 0.3s;
        }
        #status-indicator.online { background: var(--success); box-shadow: 0 0 10px var(--success); }

        /* --- Grid Layout --- */
        #widgets-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 1rem;
            padding: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* --- Widget Cards --- */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: .8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .widget-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .value { font-size: 4rem; line-height: 4rem; font-weight: 800; margin: 0.25rem 0; color: var(--text); }
        .timer-display { font-family: 'JetBrains Mono', 'Courier New', monospace; color: var(--accent); }

        .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; margin-top: 1.2rem; }

        button {
            background: #334155;
            color: white;
            border: 1px solid transparent;
            padding: 0.5rem 1.0rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover { border-color: var(--accent); }
        button:active { transform: scale(0.96); }

        /* --- Bounds Grid (3-Column Settings) --- */
        .bounds-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
        }

        .bound-item {
            background: var(--card);
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bound-item span {
            font-size: 0.55rem;
            color: #94a3b8;
            margin-bottom: 2px;
        }

        .bound-item strong {
            font-size: 0.8rem;
            color: var(--accent);
        }
        .card-hidden { display: none; }

        .btn-small {
            padding: 0.3rem 0.6rem;
            font-size: 0.65rem;
            background: #334155;
            border: 1px solid transparent;
            color: #cbd5e1;
            border-radius: 4px;
            width: 100%;
        }

        .btn-small:hover {
            background: #475569;
            color: white;
            border-color: var(--accent);
        }

        .btn-main { background-color: var(--primary); }

        .btn-reset-card {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-size: 0.7rem;
            padding: 5px;
            margin-top: 5px;
        }

        .btn-reset-card:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
        }

        .btn-stop { background-color: red; }

        .admin-section {
                margin-top: 1rem;
        }

        /* --- Debug Console --- */
        #debug-toggle { position: fixed; bottom: 10px; right: 10px; font-size: 10px; opacity: 0.5; cursor: pointer; }
        #debug-log {
            display: none; position: fixed; bottom: 40px; right: 10px;
            background: black; color: #00ff00; padding: 10px;
            font-family: monospace; font-size: 11px; max-width: 400px;
            max-height: 300px; overflow: auto; border-radius: 8px; z-index: 1000;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div id="status-indicator"></div>
            <h1>SCOREBOARD ENGINE</h1>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-danger" onclick="triggerSystemReset()">SYSTEM RESET</button>
        </div>
    </header>

    <div id="widgets-container">
    </div>

    <div id="debug-toggle" onclick="document.getElementById('debug-log').style.display = 'block'">SHOW DEBUG</div>
    <div id="debug-log"></div>

    <script>
        async function loadInitialState() {
            console.log("Fetching initial widget state...");
            try {
                const response = await fetch('/widgets');

                if (!response.ok) {
                    throw new Error(`Server responded with status: ${response.status}`);
                }

                const widgets = await response.json();

                Object.entries(widgets).forEach(([id, widget]) => {
                    render(id, widget);
                });

                console.log("Initial state synchronization complete.");
            } catch (err) {
                console.error("Failed to sync with scoreboard engine:", err);
                const container = document.getElementById('widgets-container');
                if (container && container.innerHTML === "") {
                    container.innerHTML = `<div class="error-msg">Connection Error: Is the Rust server running?</div>`;
                }
            }
        }

        // --- API COMMUNICATIONS ---
        async function api(url, method = 'POST', body = null) {
            try {
                const options = { method };
                if (body) {
                    options.headers = { 'Content-Type': 'application/json' };
                    options.body = JSON.stringify(body);
                }
                const res = await fetch(url, options);
                return res.ok;
            } catch (e) { console.error("API Error:", e); return false; }
        }

        const updateWidget = (id, payload) => api(`/widgets/${id}/update`, 'POST', payload);
        const triggerSystemReset = () => {
            if (confirm("Reload config.xml and clear current scores?")) {
                api('/reset', 'POST');
                document.getElementById('widgets-container').innerHTML = '';
            }
        };

        // --- HELPER FUNCTION FOR TARGETED TEXT UPDATES ---
        function updateTextIfChanged(parent, selector, newText) {
            const target = parent.querySelector(selector);
            if (target && target.textContent !== String(newText)) {
                target.textContent = newText;
            }
        }

        // --- CORE RENDERER (OPTIMIZED FOR SURGICAL LIVE UPDATES) ---
        function render(id, widget) {
            const container = document.getElementById('widgets-container');
            if (!container) return;

            const { type, data } = widget;
            let card = document.getElementById(`card-${id}`);
            const isFirstRender = !card;

            // 1. Initial Structural Setup (Runs precisely once per component mount)
            if (isFirstRender) {
                card = document.createElement('div');
                card.id = `card-${id}`;
                card.className = (data["dashboard-ui"] === false) ? 'card card-hidden' : 'card';
                
                let structure = `<div class="widget-label">${id.replace(/_/g, ' ')}</div>`;

                if (type === "Switch") {
                    structure += `
                        <div class="value field-display"></div>
                        <div class="controls">
                            <button class="btn-off" onclick="updateWidget('${id}', {action:'set', value:false})">OFF</button>
                            <button onclick="updateWidget('${id}', {action:'toggle'})">TOGGLE</button>
                            <button class="btn-on" onclick="updateWidget('${id}', {action:'set', value:true})">ON</button>
                        </div>`;
                }
                else if (type === "Counter") {
                    const incs = data.increments || [1];
                    let buttons = incs.map(inc => `
                        <div style="display:flex; flex-direction:column; gap:5px;">
                            <button onclick="updateWidget('${id}', {action:'increment', value:${inc}})">+${inc}</button>
                            <button class="btn-small" style="opacity:0.5" onclick="updateWidget('${id}', {action:'decrement', value:${inc}})">-${inc}</button>
                        </div>
                    `).join('');
                    structure += `
                        <div class="value field-value"></div>
                        <div class="controls">
                            ${buttons}
                            <button class="btn-reset-card" onclick="updateWidget('${id}', {action:'reset'})">RESET TO 0</button>
                        </div>`;
                }
                else if (type === "Team") {
                    structure += `
                        <div class="value list-value field-short-name" style="font-size: 1.8rem; min-height: 1.2em; color: var(--accent);"></div>
                        <div class="widget-label field-name"></div>
                        <div class="admin-section">
                            <div class="bounds-grid">
                                <div class="bound-item" style="text-align: center;">
                                    <span>SHORT NAME</span>
                                    <button class="btn-reset-card btn-edit-short" onclick="let v=prompt('Short Name:', this.getAttribute('data-val')); if(v) updateWidget('${id}', {action:'set', value:v})">EDIT</button>
                                </div>
                                <div class="bound-item" style="text-align: center;">
                                    <span>NAME</span>
                                    <button class="btn-reset-card btn-edit-name" onclick="let v=prompt('Long Name:', this.getAttribute('data-val')); if(v) updateWidget('${id}', {action:'set_name', value:v})">EDIT</button>
                                </div>
                                <div class="bound-item" style="text-align: center;">
                                    <span>PRIMARY</span>
                                    <button class="btn-reset-card btn-edit-primary" onclick="let v=prompt('Primary Color:', this.getAttribute('data-val')); if(v) updateWidget('${id}', {action:'set_primary', value:v})">EDIT</button>
                                    <div class="preview-primary" style="width: 2em; height: 2em;"></div>
                                </div>
                                <div class="bound-item" style="text-align: center;">
                                    <span>SECONDARY</span>
                                    <button class="btn-reset-card btn-edit-secondary" onclick="let v=prompt('Secondary Color:', this.getAttribute('data-val')); if(v) updateWidget('${id}', {action:'set_secondary', value:v})">EDIT</button>
                                    <div class="preview-secondary" style="width: 2em; height: 2em;"></div>
                                </div>
                            </div>
                        </div>`;
                }
                else if (type === "Timer") {
                    structure += `
                        <div class="value timer-display field-formatted-time"></div>
                        <div class="widget-label field-paused-time"></div>
                        <div class="controls">
                            <button class="btn-toggle-running" onclick="updateWidget('${id}', {action: this.getAttribute('data-action')})"></button>
                            <button class="btn-toggle-paused" onclick="updateWidget('${id}', {action: 'pause'})"></button>
                            <button class="btn-reset-timer" onclick="if(confirm('Reset?')) updateWidget('${id}', {action:'reset'})">⟲</button>
                            <button onclick="updateWidget('${id}', {action:'increment', value: 60})">+1m</button>
                            <button onclick="updateWidget('${id}', {action:'decrement', value: 60})">-1m</button>
                        </div>
                        <div class="admin-section">
                            <div class="bounds-grid">
                                <div class="bound-item">
                                    <span>MIN</span>
                                    <strong class="field-min-value"></strong>
                                    <button class="btn-reset-card btn-edit-min" onclick="let v=prompt('Min Seconds:', this.getAttribute('data-val')); if(v) updateWidget('${id}', {action:'set_min', value:v})">EDIT</button>
                                </div>
                                <div class="bound-item">
                                    <span>INITIAL</span>
                                    <strong class="field-initial-seconds"></strong>
                                    <button class="btn-reset-card btn-edit-initial" onclick="let v=prompt('Initial Seconds:', this.getAttribute('data-val')); if(v) updateWidget('${id}', {action:'set_initial', value:v})">EDIT</button>
                                </div>
                                <div class="bound-item">
                                    <span>MAX</span>
                                    <strong class="field-max-value"></strong>
                                    <button class="btn-reset-card btn-edit-max" onclick="let v=prompt('Max Seconds:', this.getAttribute('data-val')); if(v) updateWidget('${id}', {action:'set_max', value:v})">EDIT</button>
                                </div>
                                <div class="bound-item">
                                    <span>DIRECTION</span>
                                    <strong class="field-direction"></strong>
                                    <button class="btn-reset-card btn-direction-reverse">REVERSE</button>
                                </div>
                            </div>
                        </div>`;
                }
                else if (type === "List") {
                    structure += `
                        <div class="value list-value field-display-value" style="font-size: 1.8rem; min-height: 1.2em; color: var(--accent);"></div>
                        <div class="controls">
                            <button title="Previous Item" onclick="updateWidget('${id}', {action:'prev'})">PREV</button>
                            <button title="Next Item" onclick="updateWidget('${id}', {action:'next'})">NEXT</button>
                        </div>
                        <div class="admin-section" style="margin-top: 1rem;">
                            <button class="btn-reset-card" style="width: auto; padding: 0.4rem 1rem;" onclick="updateWidget('${id}', {action:'reset'})">
                                RESET TO START
                            </button>
                            <div class="field-meta-index" style="margin-top: 8px; font-size: 0.65rem; color: #64748b;"></div>
                        </div>`;
                }
                else if (type === "Text") {
                    structure += `
                        <div class="value field-content" style="font-size: 1.5rem; text-align:center;"></div>
                        <button class="btn-reset-card btn-edit-text" onclick="let t=prompt('Update Text:', this.getAttribute('data-val')); if(t) updateWidget('${id}', t)">EDIT</button>`;
                }
                else if (type === "Calculation") {
                    structure += `<div class="value field-value" style="font-size: 1.5rem; text-align:center;"></div>`;
                }

                card.innerHTML = structure;
                container.appendChild(card);
            }

            // 2. High-Efficiency Fine-Grained Value Mutation (Fires every SSE event)
            if (type === "Switch") {
                const val = data.value ?? false;
                const dsp = val ? data.display_true : data.display_false;
                updateTextIfChanged(card, '.field-display', dsp);

                const offBtn = card.querySelector('.btn-off');
                const onBtn = card.querySelector('.btn-on');
                if (offBtn) offBtn.className = val ? 'btn-main' : 'btn-stop';
                if (onBtn) onBtn.className = val ? 'btn-stop' : 'btn-main';
            }
            else if (type === "Counter") {
                updateTextIfChanged(card, '.field-value', data.value ?? 0);
            }
            else if (type === "Team") {
                const { name, short_name, primary_color, secondary_color } = data;
                updateTextIfChanged(card, '.field-short-name', short_name);
                updateTextIfChanged(card, '.field-name', name);

                // Update configuration attributes for structural modal prompt popups
                const btnShort = card.querySelector('.btn-edit-short');
                const btnName = card.querySelector('.btn-edit-name');
                const btnPrimary = card.querySelector('.btn-edit-primary');
                const btnSecondary = card.querySelector('.btn-edit-secondary');
                if (btnShort) btnShort.setAttribute('data-val', short_name);
                if (btnName) btnName.setAttribute('data-val', name);
                if (btnPrimary) btnPrimary.setAttribute('data-val', primary_color);
                if (btnSecondary) btnSecondary.setAttribute('data-val', secondary_color);

                // Inline Color CSS styling updates
                const previewP = card.querySelector('.preview-primary');
                const previewS = card.querySelector('.preview-secondary');
                if (previewP && previewP.style.backgroundColor !== primary_color) previewP.style.backgroundColor = primary_color;
                if (previewS && previewS.style.backgroundColor !== secondary_color) previewS.style.backgroundColor = secondary_color;
            }
            else if (type === "Timer") {
                const { initial_seconds, value, paused, paused_time, formatted_time, running, is_down, min_value, max_value } = data;
                
                updateTextIfChanged(card, '.field-formatted-time', formatted_time);
                updateTextIfChanged(card, '.field-paused-time', `Stoppage Time: ${paused_time} seconds`);
                updateTextIfChanged(card, '.field-min-value', `${min_value}s`);
                updateTextIfChanged(card, '.field-initial-seconds', `${initial_seconds}s`);
                updateTextIfChanged(card, '.field-max-value', `${max_value}s`);
                updateTextIfChanged(card, '.field-direction', is_down ? 'DOWN' : 'UP');

                // Dynamic Action and Button Labels
                const runBtn = card.querySelector('.btn-toggle-running');
                if (runBtn) {
                    const nextAction = running ? 'stop' : 'start';
                    if (runBtn.getAttribute('data-action') !== nextAction) runBtn.setAttribute('data-action', nextAction);
                    updateTextIfChanged(card, '.btn-toggle-running', running ? 'STOP' : 'START');
                    runBtn.className = `btn-toggle-running ${running ? 'btn-stop' : 'btn-main'}`;
                }

                const pauseBtn = card.querySelector('.btn-toggle-paused');
                if (pauseBtn) {
                    updateTextIfChanged(card, '.btn-toggle-paused', paused ? '▶' : '⏸');
                    pauseBtn.className = `btn-toggle-paused ${paused ? 'btn-stop' : 'btn-main'}`;
                }

                const resetBtn = card.querySelector('.btn-reset-timer');
                if (resetBtn) resetBtn.title = `Reset to ${initial_seconds}s`;

                // Prompts references
                const btnMin = card.querySelector('.btn-edit-min');
                const btnInit = card.querySelector('.btn-edit-initial');
                const btnMax = card.querySelector('.btn-edit-max');
                if (btnMin) btnMin.setAttribute('data-val', min_value);
                if (btnInit) btnInit.setAttribute('data-val', initial_seconds);
                if (btnMax) btnMax.setAttribute('data-val', max_value);

                const revBtn = card.querySelector('.btn-direction-reverse');
                if (revBtn) {
                    revBtn.onclick = () => updateWidget(id, { action: 'set_direction', value: is_down ? 'UP' : 'DOWN' });
                }
            }
            else if (type === "List") {
                const index = data.index;
                const options = data.options;
                const displayValue = options[index] || "---";

                updateTextIfChanged(card, '.field-display-value', displayValue);
                updateTextIfChanged(card, '.field-meta-index', `Index: ${index} | Total: ${options.length}`);
            }
            else if (type === "Text") {
                updateTextIfChanged(card, '.field-content', data.content);
                const btnText = card.querySelector('.btn-edit-text');
                if (btnText) btnText.setAttribute('data-val', data.content);
            }
            else if (type === "Calculation") {
                updateTextIfChanged(card, '.field-value', data.value);
            }
        }

        // --- SSE LIFECYCLE ---
        window.addEventListener('DOMContentLoaded', () => {
            console.log('DOM Content Loaded');
            loadInitialState();
            const statusIndicator = document.getElementById('status-indicator');
            const debugLog = document.getElementById('debug-log');

            const connect = () => {
                const es = new EventSource('/events');

                es.onopen = () => {
                    console.log("Connected to Scoreboard Engine");
                    statusIndicator.classList.add('online');
                };

                es.onmessage = (e) => {
                    const widgets = JSON.parse(e.data);
                    // Update debug log
                    debugLog.innerText = JSON.stringify(widgets, null, 2);

                    // Render each widget found in the payload
                    Object.entries(widgets).forEach(([id, w]) => render(id, w));
                };

                es.onerror = () => {
                    console.error("Connection lost. Retrying...");
                    statusIndicator.classList.remove('online');
                    es.close();
                    setTimeout(connect, 2000); // Auto-reconnect after 2s
                };
            };

            connect();
        });
    </script>
</body>
</html>
