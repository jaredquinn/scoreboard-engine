<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netball Scorebug Broadcast Test</title>
    <link rel="stylesheet" href="/pages/examples.css">
</head>
<body>
    <div class="scorebug">
        <div class="match-info">
            <div class="period" data-bind="period">---</div>
            <div class="clock" data-bind="match_clock_formatted">00:00</div>
        </div>

        <div class="team-container" id="team-home">
            <div class="team-badge" 
                 data-bind="home_team" 
                 data-background="home_team_primary_color" 
                 data-foreground="home_team_secondary_color">
                 HOME
            </div>
            <div class="team-score" data-bind="home_score">0</div>
            <span class="pass-indicator"></span>
        </div>

        <div class="team-container" id="team-away">
            <span class="pass-indicator"></span>
            <div class="team-badge" 
                 data-bind="away_team" 
                 data-background="away_team_primary_color" 
                 data-foreground="away_team_secondary_color">
                 AWAY
            </div>
            <div class="team-score" data-bind="away_score">0</div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            console.log('𖣘  Scoreboard Engine Initializing');
            let values = {};
            let elementCache = {};
            let reconnectDelay = 2000;
            let es = null;

            const indexElements = () => {
                elementCache = {};
                const elements = document.querySelectorAll('[data-foreground], [data-background], [data-bind], [data-visible], [data-invisible]');
                
                elements.forEach(el => {
                    const attrs = ['foreground', 'background', 'bind', 'visible', 'invisible'];
                    attrs.forEach(attr => {
                        const id = el.dataset[attr];
                        if (id) {
                            if (!elementCache[id]) elementCache[id] = [];
                            if (!elementCache[id].includes(el)) {
                                elementCache[id].push(el);
                            }
                        }
                    });
                });
            };

            const connect = () => {
                es = new EventSource('/sse');

                es.onopen = () => {
                    console.log("🔌 Connected to Scoreboard Engine");
                    reconnectDelay = 2000;
                    document.dispatchEvent(new CustomEvent('scoreboard:connected'));
                };

                es.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    const widgets = data[0];

                    Object.entries(widgets).forEach(([id, w]) => {
                        if (values[id] != w) {
                            values[id] = w;
                            console.log('updated ' + id + ' to ' + w);

                            document.dispatchEvent(new CustomEvent('scoreboard:update', {
                                detail: { id, value: w }
                            }));

                            const els = elementCache[id] || [];
                            els.forEach(el => {
                                const allowed = el.dispatchEvent(new CustomEvent('scoreboard:element-update', {
                                    detail: { id, value: w },
                                    cancelable: true
                                }));

                                if (!allowed) return;

                                if (el.dataset.foreground === id) el.style.color = w;
                                if (el.dataset.background === id) el.style.backgroundColor = w;
                                if (el.dataset.bind === id) el.innerHTML = w;

                                if (el.dataset.visible === id) {
                                    if (w == true) { el.style.visibility = 'visible'; } else { el.style.visibility = 'hidden'; }
                                }
                                if (el.dataset.invisible === id) {
                                    if (w == true) { el.style.visibility = 'hidden'; } else { el.style.visibility = 'visible'; }
                                }
                            });
                        }
                    });
                };

                es.onerror = () => {
                    console.error("🔌 Connection lost. Retrying...");
                    es.close();
                    document.dispatchEvent(new CustomEvent('scoreboard:disconnected'));
                    
                    const jitter = Math.random() * 1000;
                    setTimeout(() => {
                        reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
                        connect();
                    }, reconnectDelay + jitter);
                };
            };

            indexElements();
            connect();
        });
    </script>

    <script>
        /**
         * The standard engine updates colors and text automatically out of the box.
         * Netball requires a 'Center Pass' indicator dot to show who serves next.
         * We leverage the new 'scoreboard:update' global custom event to manage this seamlessly.
         */
        document.addEventListener('scoreboard:update', (e) => {
            const { id, value } = e.detail;

            if (id === 'pass') {
                const homeBlock = document.getElementById('team-home');
                const awayBlock = document.getElementById('team-away');

                if (value === 'HOME') {
                    homeBlock.classList.add('has-pass');
                    awayBlock.classList.remove('has-pass');
                } else if (value === 'AWAY') {
                    awayBlock.classList.add('has-pass');
                    homeBlock.classList.remove('has-pass');
                } else {
                    homeBlock.classList.remove('has-pass');
                    awayBlock.classList.remove('has-pass');
                }
            }
        });
    </script>

</body>
</html>
