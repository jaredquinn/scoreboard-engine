<html>
<head>
	<script src="/scoreboard.js"></script>
</head>
<style>
* 		{ box-sizing: border-box; }
body	 	{ background-color: transparent; font-family: Sans-Serif; font-size: 32px; } 
div		{ padding: 0; margin: 0; }
#container	{ width: 1920px; height: 1080px; background-color: transparent; }

#scorebar	{ position: absolute; top: 40px; right: 40px; 
		  width: 400px; 
		}

#scorebar {
		  display: grid;
		  grid-template-columns: auto 8px auto auto;
		  grid-template-rows: auto auto;
		}
#scorebar div   { text-align: center; padding: 8px 4px; }
#shotclock	{ position: absolute; top: 40; left: 40px;
		  width: 100px; background-color: black; color: white; text-align: center; }
#shotclock span { font-size: 2em; }


.period 	{ background-color: white; color: black; font-size: 24px; line-height: 32px; }
.clock		{ background-color: white; color: black; font-weight: bold; }
.score		{ background-color: black; color: white; }
.total		{ font-weight: bold; }
.pass	 	{ background-color: black; }
</style>
<body>
	<div id="container">

		<div id="shotclock" data-visible="shot_clock_running">
			<span data-bind="shot_clock" />
		</div>

		<div id="scorebar">

			<div class="period">
				<span data-bind="period"></span>
			</div>

			<div style="padding: 0;">
				<div style="height: 100%; width: 4px;" class="pass homepass" style="background-color: black;" data-invisible="pass_value" >
				</div>
			</div>

			<div class="score homescore" data-background="home_team_primary_color" data-foreground="home_team_secondary_color">
				<span data-bind="home_team"></span>
			</div>

			<div class="score homescore" data-background="home_team_primary_color" data-foreground="home_team_secondary_color">
				<span data-bind="home_score"></span>
			</div>

			<div class="clock">
				<span data-bind="match_clock_formatted"></span>
			</div>

			<div style="padding: 0;">
				<div style="height: 100%; width: 4px;" class="pass homepass" style="background-color: black;" data-visible="pass_value" >
				</div>
			</div>

			<div class="score awayscore" data-background="away_team_primary_color" data-foreground="away_team_secondary_color">
				<span data-bind="away_team"></span>
			</div>

			<div class="score awayscore" data-background="away_team_primary_color" data-foreground="away_team_secondary_color">
				<span data-bind="away_score"></span>
			</div>

		</div>
	</div>
</body>
</html>
